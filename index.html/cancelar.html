<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denúncia</title>
    <link rel="stylesheet" href="../style.css/styleatt.css">
</head>
<body>
    <header>
        <h1>Cidadão <span>Ativo</span></h1>

        <nav>
            <a href="index.html">Início</a>
            <a href="Infraestrutura.html">Infraestrutura</a>
            <a href="Formulário infra.html">Denúncia</a>
            <a href="voluntariado-infraestrutura.html">Voluntariado</a>
            <a href="Central de ajuda.html">Central de Ajuda</a>
        </nav>
    </header>
    <div class="container">
    <form class="formulario" action="https://formsubmit.co/lucascordeirosoares972@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="Nova denúncia - Cidadão Ativo">
    <input type="hidden" name="_captcha" value="false">
        <fieldset class="grupo">

    <h2>Cancelar Soliticitação</h2>
    <label for="nome">Nome: </label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required> <br> 

    <label for="email">Email: </label>
    <input type="email" id="email" name="email" placeholder="Digite seu Email" required> <br> 
    
    <label for="obs">Motivo do Cancelamento:</label>
    <br>
    <textarea id="obs" name="observacoes" rows="5" cols="40" placeholder="Descreva o motivo do cancelamento..."></textarea  >
    <br>


    <label for="categoria">Categoria do Problema: </label> 
    <select name="categoria" id="categoria">
        <option value="" disabled selected></option>
        <option value="Saúde">Saúde</option>
        <option value="Situação de Rua">Situação de Rua</option>
        <option value="Animais">Animais</option>
        <option value="Infraestrutura">Infraestrutura</option>
    </select>  <br>

    <br>

    <button type="submit">Confirmar</button>
    

    <a href="infraestrutura.html">
    <button type="button">Voltar</button> </a>
        </fieldset>
    </form>
</div>




</body>
</html>
